<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d9488">
<title>eBay 利益計算（パートナー用）</title>
<style>
  :root{
    --bg:#f4f6f8; --card:#ffffff; --ink:#1b2733; --sub:#6b7a89;
    --line:#e2e8f0; --accent:#0d9488; --accent-soft:#e6f4f1;
    --pos:#0f9d58; --neg:#e03e3e; --field:#f1f5f9; --ro:#eef1f4;
    --us:#1d4ed8; --us-soft:#eaf0ff;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0e1418; --card:#18222b; --ink:#e8eef3; --sub:#9aabbb;
      --line:#26333d; --accent:#2dd4bf; --accent-soft:#123430;
      --pos:#4ade80; --neg:#f87171; --field:#0f1a21; --ro:#10171d;
      --us:#7aa2ff; --us-soft:#16233f;
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    font-size:16px; line-height:1.35; padding:8px 10px 16px;}
  .wrap{max-width:520px; margin:0 auto;}
  h1{font-size:.82rem; margin:0 2px 8px; display:flex; align-items:center; gap:6px; color:var(--sub); font-weight:700;}
  h1 .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:10px; margin-bottom:9px;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:8px 10px;}
  .field label{display:block; font-size:.7rem; color:var(--sub); margin-bottom:3px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .inputrow{position:relative; display:flex; align-items:center;}
  .unit{position:absolute; left:10px; color:var(--sub); font-size:.82rem; font-weight:700; pointer-events:none;}
  .unit.r{left:auto; right:11px; font-weight:600;}
  input[type=number]{width:100%; border:1.5px solid var(--line); background:var(--field); color:var(--ink);
    border-radius:10px; padding:9px 11px 9px 30px; font-size:1rem; font-weight:700; outline:none; transition:border-color .15s; -moz-appearance:textfield;}
  input.pad-r{padding:9px 26px 9px 11px;}
  input.pad-plain{padding:9px 11px;}
  input[readonly]{background:var(--ro); color:var(--sub); border-style:dashed;}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  input:focus{border-color:var(--accent);}
  #total{border-color:var(--accent); background:var(--accent-soft); color:var(--ink);}
  .shiptag{font-size:.64rem; color:var(--sub); margin-top:3px; font-weight:600;}
  .fxline{display:flex; align-items:center; gap:7px; margin-top:9px; font-size:.72rem; color:var(--sub);}
  .fxline #fxMarket{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .fxbtn{background:var(--accent-soft); color:var(--accent); border:none; border-radius:7px; padding:5px 9px; font-size:.72rem; font-weight:700; cursor:pointer;}
  .fxbtn:active{opacity:.6;}

  .res{border-radius:16px; padding:15px 16px 16px; background:var(--us-soft); margin-bottom:9px;}
  .res h2{margin:0 0 10px; font-size:.92rem; font-weight:800; color:var(--us);}
  .res h2 small{font-weight:600; font-size:.68rem; color:var(--sub); margin-left:4px;}
  .res .k{font-size:.74rem; color:var(--sub); margin-bottom:2px;}
  .res .v{font-size:2rem; font-weight:800; letter-spacing:-1px; line-height:1.1;}
  .res .v.pos{color:var(--pos);} .res .v.neg{color:var(--neg);}
  .res .pct{font-size:.72rem; color:var(--sub); font-weight:600; margin-top:3px;}

  details{margin:0;}
  summary{cursor:pointer; font-size:.76rem; color:var(--sub); font-weight:700; list-style:none; padding:2px;}
  summary::-webkit-details-marker{display:none;}
  summary::before{content:"⚙ ";}
  .adv{margin-top:9px;}
  .adv label{font-size:.66rem;}
  .reset{margin-top:9px; background:none; border:1px solid var(--line); color:var(--sub); border-radius:9px; padding:6px 11px; font-size:.72rem; font-weight:600; cursor:pointer;}
  .note{font-size:.66rem; color:var(--sub); margin-top:9px; line-height:1.5;}
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="dot"></span>eBay 利益計算（パートナー用・US向け）</h1>

  <div class="card">
    <div class="grid">
      <div class="field"><label>① 販売価格 $</label>
        <div class="inputrow"><span class="unit">$</span>
          <input type="number" id="price" inputmode="decimal" placeholder="0" value="125"></div></div>
      <div class="field"><label>② 送料 $（自動）</label>
        <div class="inputrow"><span class="unit">$</span>
          <input type="number" id="ship" inputmode="decimal" placeholder="0" readonly></div>
        <div class="shiptag" id="shipTag">段階1</div></div>
      <div class="field"><label>③ 合計 $（販売＋送料）</label>
        <div class="inputrow"><span class="unit">$</span>
          <input type="number" id="total" inputmode="decimal" placeholder="0"></div></div>
      <div class="field"><label>④ 仕入れ ¥</label>
        <div class="inputrow"><span class="unit">¥</span>
          <input type="number" id="cost" inputmode="numeric" placeholder="0" value="12000"></div></div>
      <div class="field"><label>⑤ プロモ率 %</label>
        <div class="inputrow"><input class="pad-r" type="number" id="promo" inputmode="decimal" placeholder="3" value="3">
          <span class="unit r">%</span></div></div>
      <div class="field"><label>為替 ¥/$</label>
        <div class="inputrow"><input class="pad-plain" type="number" id="fx" inputmode="decimal" value="161.31"></div></div>
    </div>
    <div class="fxline">
      <span id="fxMarket">市場レート 取得中…</span>
      <button type="button" class="fxbtn" id="fxRefresh">↻ 最新に更新</button>
    </div>
  </div>

  <div class="res">
    <h2>US向け 還付前 粗利 <small>関税あり</small></h2>
    <div class="v" id="usPre">–</div>
    <div class="pct" id="usPreP"></div>
  </div>

  <div class="card">
    <details id="advBox">
      <summary>詳細設定（手数料・関税）</summary>
      <div class="adv">
        <div class="grid">
          <div class="field"><label>Sales tax %</label><input class="pad-plain" type="number" id="tax" inputmode="decimal" value="10"></div>
          <div class="field"><label>eBay FVF %</label><input class="pad-plain" type="number" id="fvf" inputmode="decimal" value="13.25"></div>
          <div class="field"><label>海外手数料 %</label><input class="pad-plain" type="number" id="intl" inputmode="decimal" value="1.35"></div>
          <div class="field"><label>Payoneer %</label><input class="pad-plain" type="number" id="payoneer" inputmode="decimal" value="2"></div>
          <div class="field"><label>関税 Duty %</label><input class="pad-plain" type="number" id="duty" inputmode="decimal" value="13.1"></div>
          <div class="field"><label>Duty固定 $</label><input class="pad-plain" type="number" id="dutyF" inputmode="decimal" value="7"></div>
        </div>
        <button class="reset" id="resetBtn">既定値に戻す</button>
        <div class="note">①販売価格→②送料が段階表で自動。③合計→送料と販売価格が自動。送料はUS向けの売上（合計）に含めeBay手数料の対象＋発送コストとして計上。手取り＝合計−eBay手数料−関税→円換算後Payoneer控除−送料−仕入。為替は1日1回自動取得・入力は自動保存。</div>
      </div>
    </details>
  </div>
</div>

<script>
(function(){
  // {R: 商品価格上限(=F-L), F: 送料込み上限, L: 送料}
  var SHIP=[[130,150,20],[170,200,30],[210,250,40],[255,300,45],[300,350,50],[345,400,55],[390,450,60],[430,500,70],[520,600,80],[610,700,90],[700,800,100],[780,900,120],[870,1000,130],[960,1100,140],[1040,1200,160],[1130,1300,170],[1220,1400,180],[1300,1500,200],[1390,1600,210],[1480,1700,220],[1570,1800,230],[1650,1900,250],[1740,2000,260],[1830,2100,270],[1910,2200,290],[2000,2300,300],[2090,2400,310],[2170,2500,330]];
  var calcIds=["price","cost","promo","fx","tax","fvf","intl","payoneer","duty","dutyF"];
  var defaults={price:"125",cost:"12000",promo:"3",fx:"161.31",tax:"10",fvf:"13.25",intl:"1.35",payoneer:"2",duty:"13.1",dutyF:"7"};
  var $=function(id){return document.getElementById(id);};
  var num=function(id){var v=parseFloat($(id).value);return isFinite(v)?v:0;};
  function yen(n){var r=Math.round(n);return (r<0?"−¥":"¥")+Math.abs(r).toLocaleString("ja-JP");}
  function r2(n){return Math.round(n*100)/100;}
  // 商品価格 P → 段階（P<=R の最初）
  function tierByPrice(P){for(var i=0;i<SHIP.length;i++){if(P<=SHIP[i][0])return i;}return SHIP.length-1;}
  // 合計 T → 段階（T<F の最初）
  function tierByTotal(T){for(var i=0;i<SHIP.length;i++){if(T<SHIP[i][1])return i;}return SHIP.length-1;}

  function compute(){
    var P=num("price"), ship=num("ship"), cost=num("cost");
    var promo=num("promo")/100, fx=num("fx"), tax=num("tax")/100;
    var fvf=num("fvf")/100, intl=num("intl")/100, payo=num("payoneer")/100;
    var dutyR=num("duty")/100, dutyF=num("dutyF");

    var total=P+ship;                                  // 合計（買い手支払い）
    var ebayFees=total*(1+tax)*(fvf+promo+intl);       // eBay手数料は合計ベース
    var duty=P*dutyR+dutyF;                             // 関税は商品価格ベース
    var netUSD=total-ebayFees-duty;
    var netYen=netUSD*fx*(1-payo);
    var pre=netYen-ship*fx-cost;                        // 送料(発送コスト)・仕入を円で控除
    var baseJPY=P*fx;
    var el=$("usPre"); el.textContent=yen(pre); el.className="v "+(pre>=0?"pos":"neg");
    $("usPreP").textContent="粗利率 "+(baseJPY>0?(pre/baseJPY*100>=0?"":"−")+Math.abs(pre/baseJPY*100).toFixed(1):"0.0")+"%";

    try{var o={};calcIds.forEach(function(k){o[k]=$(k).value;});o.ship=$("ship").value;localStorage.setItem("ebayProfitCalcPartner",JSON.stringify(o));}catch(e){}
  }
  function setShipTag(i,over){$("shipTag").textContent="段階"+(i+1)+(over?"（表上限超）":"");}
  // 販売価格から：送料・合計を埋める
  function fromPrice(){
    var P=num("price"); var i=tierByPrice(P); var over=P>SHIP[SHIP.length-1][0];
    $("ship").value=SHIP[i][2]; $("total").value=r2(P+SHIP[i][2]); setShipTag(i,over); compute();
  }
  // 合計から：送料・販売価格を埋める
  function fromTotal(){
    var T=num("total"); var i=tierByTotal(T); var over=T>=SHIP[SHIP.length-1][1];
    var L=SHIP[i][2]; $("ship").value=L; $("price").value=r2(Math.max(0,T-L)); setShipTag(i,over); compute();
  }

  try{var saved=JSON.parse(localStorage.getItem("ebayProfitCalcPartner")||"null");
    if(saved){calcIds.forEach(function(k){if(saved[k]!==undefined)$(k).value=saved[k];});}}catch(e){}

  $("price").addEventListener("input",fromPrice);
  $("total").addEventListener("input",fromTotal);
  ["cost","promo","fx","tax","fvf","intl","payoneer","duty","dutyF"].forEach(function(k){$(k).addEventListener("input",compute);});
  $("resetBtn").addEventListener("click",function(){calcIds.forEach(function(k){$(k).value=defaults[k];});fromPrice();});
  fromPrice();

  /* 為替の自動取得（1日1回キャッシュ・非同期・失敗しても無害） */
  function todayStr(){var d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
  function showMarket(m){$("fxMarket").textContent=m?("市場レート ¥"+m.rates.JPY.toFixed(2)+"（"+m.date+"）"):"市場レート 取得できず（手動でOK）";}
  function fetchRate(){
    return fetch("https://api.frankfurter.dev/v1/latest?base=USD&symbols=JPY")
      .then(function(r){return r.json();})
      .then(function(j){if(j&&j.rates&&j.rates.JPY)return {rates:j.rates,date:j.date};throw 0;})
      .catch(function(){return fetch("https://open.er-api.com/v6/latest/USD").then(function(r){return r.json();})
        .then(function(j){if(j&&j.rates&&j.rates.JPY)return {rates:{JPY:j.rates.JPY},date:(j.time_last_update_utc||"").slice(5,16)};throw 0;});});
  }
  function loadRate(force,applyFx){
    var key="ebayFxMarket";
    if(!force){try{var c=JSON.parse(localStorage.getItem(key)||"null");if(c&&c.fetchedDay===todayStr()){window.__fxMarket=c;showMarket(c);
      try{var s0=JSON.parse(localStorage.getItem("ebayProfitCalcPartner")||"null");if(!s0||s0.fx===undefined||s0.fx===defaults.fx){$("fx").value=c.rates.JPY;}}catch(e){}
      compute();return;}}catch(e){}}
    $("fxMarket").textContent="市場レート 取得中…";
    fetchRate().then(function(m){
      m.fetchedDay=todayStr(); window.__fxMarket=m; showMarket(m);
      try{localStorage.setItem(key,JSON.stringify(m));}catch(e){}
      if(applyFx){ $("fx").value=m.rates.JPY; }
      else { try{var s=JSON.parse(localStorage.getItem("ebayProfitCalcPartner")||"null");if(!s||s.fx===undefined||s.fx===defaults.fx){$("fx").value=m.rates.JPY;}}catch(e){} }
      compute();
    }).catch(function(){showMarket(null);});
  }
  $("fxRefresh").addEventListener("click",function(){loadRate(true,true);});
  loadRate(false,false);
})();
</script>
</body>
</html>
